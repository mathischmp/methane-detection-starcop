project:
  name: "methane-detection-starcop"
  experiment_name: "segformer-b0-v1"

storage:
  drive_data_easy_train: "https://drive.google.com/uc?id=1C4ZHvT1ZPKVMFGmqcV12Aozs8Uv_DIxD"
  drive_data_test : "https://drive.google.com/uc?id=1TwtSVpbvGd-lWfIjQrw0i4LqkiX2EuHq"
  local_raw_path: "data"


training:
  n_folds: 5
  batch_size: 8
  num_epochs: 20
  learning_rate: 1e-4
  weight_decay: 1e-5
  img_size: 512
  num_workers: 4
  device: "cuda"
  loss: "dice_loss"
  model:
    name: "segformer_b0"
    pretrained: true
  